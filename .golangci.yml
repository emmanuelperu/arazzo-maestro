# Sensible defaults for arazzo-maestro. Aimed at catching real bugs,
# not bikeshedding style. The CI workflow runs `golangci-lint run`
# against this config.

run:
  timeout: 5m
  # Skip the embedded JSON Schema fixture — it's vendored upstream
  # and has its own validation pipeline.
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck      # ignored error returns
    - errorlint     # %w wrapping consistency
    - gofmt         # canonical formatting
    - gosec         # security smells
    - govet         # built-in static analyser
    - ineffassign   # dead assignments
    - misspell      # typos
    - revive        # replacement for the deprecated golint
    - staticcheck   # broad bug catcher
    - unconvert     # redundant type conversions
    - unused        # unused symbols (exported + unexported)

linters-settings:
  errcheck:
    # We deliberately discard the return of these helpers in print-only
    # CLI paths. Adding `_ = ...` everywhere would be noise.
    exclude-functions:
      - fmt.Fprintln
      - fmt.Fprintf
      - (*bytes.Buffer).WriteString
      - (*strings.Builder).WriteString

  gosec:
    excludes:
      # G304: variable file path is the entire point of our CLI tool
      # (the user passes the file to lint/view).
      - G304
      # G306: 0644 is the right mode for a generated HTML output.
      - G306
      # G203: every call to `template.HTML(...)` / `template.CSS(...)`
      # in internal/renderer/renderer.go is preceded by an explicit
      # `html.EscapeString(...)` on the user-controlled portion, or
      # wraps a hardcoded string (FontStack). Manual review > gosec
      # here.
      - G203

  misspell:
    # No `locale:` so the linter only flags real typos, not regional
    # variants (the codebase is a mix of British and American English).

  revive:
    severity: warning
    rules:
      - name: var-naming
      - name: indent-error-flow
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: increment-decrement
      - name: range-val-in-closure
      - name: redefines-builtin-id
      - name: superfluous-else

issues:
  # Don't gate the first PR on legacy noise; opt-in stricter later.
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files often need shorter, more flexible patterns.
    - path: _test\.go
      linters:
        - gosec
        - errcheck
