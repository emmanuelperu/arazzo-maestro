# goreleaser v2 config — see https://goreleaser.com/customization/
#
# Triggered by `.github/workflows/release.yml` on every `v*` tag push.
# Produces:
#   - multi-OS / multi-arch binaries (linux, darwin, windows)
#   - multi-arch Docker image on ghcr.io (linux/amd64 + linux/arm64)
#   - SBOM (Syft) for each archive
#   - cosign-signed artefacts (keyless via GitHub OIDC)
#   - GitHub Release with autogenerated changelog
#
# This config unlocks the OpenSSF Scorecard `Signed-Releases` and
# `Packaging` checks (see Plan.md > OpenSSF Phase 2).

version: 2

project_name: arazzo-maestro

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: arazzo-maestro
    main: ./cmd/arazzo-maestro
    binary: arazzo-maestro
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    # Windows on arm64 is uncommon for CLI tools and we have no
    # demand; skip it.
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: arazzo-maestro
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - SECURITY.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ---- Docker (multi-arch) ----------------------------------------------------

dockers:
  - id: amd64
    image_templates:
      - "ghcr.io/emmanuelperu/arazzo-maestro:{{ .Version }}-amd64"
      - "ghcr.io/emmanuelperu/arazzo-maestro:latest-amd64"
    dockerfile: Dockerfile.release
    use: buildx
    goarch: amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.source=https://github.com/emmanuelperu/arazzo-maestro
      - --label=org.opencontainers.image.title=arazzo-maestro
      - --label=org.opencontainers.image.licenses=Apache-2.0

  - id: arm64
    image_templates:
      - "ghcr.io/emmanuelperu/arazzo-maestro:{{ .Version }}-arm64"
      - "ghcr.io/emmanuelperu/arazzo-maestro:latest-arm64"
    dockerfile: Dockerfile.release
    use: buildx
    goarch: arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.source=https://github.com/emmanuelperu/arazzo-maestro
      - --label=org.opencontainers.image.title=arazzo-maestro
      - --label=org.opencontainers.image.licenses=Apache-2.0

docker_manifests:
  - name_template: "ghcr.io/emmanuelperu/arazzo-maestro:{{ .Version }}"
    image_templates:
      - "ghcr.io/emmanuelperu/arazzo-maestro:{{ .Version }}-amd64"
      - "ghcr.io/emmanuelperu/arazzo-maestro:{{ .Version }}-arm64"
  - name_template: "ghcr.io/emmanuelperu/arazzo-maestro:latest"
    image_templates:
      - "ghcr.io/emmanuelperu/arazzo-maestro:latest-amd64"
      - "ghcr.io/emmanuelperu/arazzo-maestro:latest-arm64"

# ---- Signing (cosign keyless, GitHub OIDC) ---------------------------------

signs:
  - cmd: cosign
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
    artifacts: all
    signature: "${artifact}.sig"

docker_signs:
  - cmd: cosign
    args:
      - sign
      - "--yes"
      - "${artifact}@${digest}"
    artifacts: manifests

# ---- SBOM (Syft) -----------------------------------------------------------

sboms:
  - id: archive
    artifacts: archive

# ---- GitHub Release --------------------------------------------------------

release:
  github:
    owner: emmanuelperu
    name: arazzo-maestro
  draft: false
  # Treat anything with a `-rc`, `-alpha`, `-beta` suffix as a
  # prerelease automatically. v0.0.1 is a regular release.
  prerelease: auto
  header: |
    First public release of `arazzo-maestro`.

    See the [README](https://github.com/emmanuelperu/arazzo-maestro#readme)
    for installation and usage.
  footer: |
    ---

    Binaries are signed with [cosign](https://docs.sigstore.dev/cosign/overview/)
    via GitHub OIDC. To verify:

    ```sh
    cosign verify-blob \
      --certificate-identity-regexp 'https://github.com/emmanuelperu/arazzo-maestro/.github/workflows/release.yml@.*' \
      --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      --signature arazzo-maestro_<version>_<os>_<arch>.tar.gz.sig \
      arazzo-maestro_<version>_<os>_<arch>.tar.gz
    ```

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*feat(\(.+\))?:.*$'
      order: 0
    - title: Bug fixes
      regexp: '^.*fix(\(.+\))?:.*$'
      order: 1
    - title: CI / Build
      regexp: '^.*(ci|build|make)(\(.+\))?:.*$'
      order: 2
    - title: Documentation
      regexp: '^.*docs?(\(.+\))?:.*$'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^Initial commit"
