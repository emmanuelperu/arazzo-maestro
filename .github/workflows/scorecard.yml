# Run the OpenSSF Scorecard analyser and publish the results to:
#   - the Security tab via SARIF (for in-repo triage)
#   - https://scorecard.dev (public score tracked by the README badge)
#
# One-time setup:
#   1. Enable the action on the default branch.
#   2. Repo Settings → Code security → Enable "Scorecard" if listed,
#      or simply let this workflow create its own SARIF reports.
#
# Third-party actions are pinned to a full commit SHA (with the
# human-readable version in a trailing comment) to satisfy Scorecard
# `Pinned-Dependencies`. Dependabot bumps both fields on upstream
# releases.

name: scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly, every Monday at 06:17 UTC. Off-peak slot to avoid CI rushes.
    - cron: "17 6 * * 1"
  push:
    branches: [main]

# Least privilege at the workflow level.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF to the Security tab.
      security-events: write
      # Needed for the publish_results step to attest the run.
      id-token: write
      # Read repo metadata (code review, etc.).
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results=true sends the score to scorecard.dev so the
          # README badge resolves. Safe: no secrets leaked, only the
          # public results.
          publish_results: true
          # The default GITHUB_TOKEN cannot read branch-protection rules
          # (that scope is not available at job-level `permissions`), so
          # the Branch-Protection check returns -1 unless a fine-grained
          # PAT is provided via the SCORECARD_TOKEN repo secret.
          #
          # To unlock the check (~+1 point on the overall score):
          #   1. Create a fine-grained PAT, scope: this repo only,
          #      "Repository permissions" → "Administration: Read".
          #   2. Save it as the SCORECARD_TOKEN repo secret.
          # Without the secret, this falls back to GITHUB_TOKEN and the
          # check stays at -1 — no breakage.
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v3
        with:
          sarif_file: results.sarif
