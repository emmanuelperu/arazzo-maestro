# Build the promotional landing page from the *real* `view` output and
# deploy it to GitHub Pages.
#
# The preview in docs/index.html is regenerated here from source on every
# run (docs/gen-preview.py invokes the real binary via `go run`), so what
# ships to Pages can never drift from what `arazzo-maestro view` produces.
#
# One-time setup: repo Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions".
#
# Third-party actions are pinned to a full commit SHA (with the
# human-readable version in a trailing comment) to satisfy Scorecard
# `Pinned-Dependencies`. Dependabot bumps both fields on upstream
# releases.

name: pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "cmd/**"
      - "internal/**"
      - "examples/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege by default; the deploy job widens what it needs.
permissions:
  contents: read

# Never run two Pages deploys at once; let a newer one supersede.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # python3 is preinstalled on ubuntu-latest runners.
      - name: Regenerate the landing preview from real `view` output
        run: python3 docs/gen-preview.py

      - name: Guard, eco-design invariants must hold
        run: |
          f=docs/index.html
          fail=0
          if grep -q "cdn.tailwindcss.com" "$f"; then echo "::error file=$f::Tailwind CDN reference leaked (eco-design R1: 0 requests)"; fail=1; fi
          if grep -q "<script" "$f"; then echo "::error file=$f::<script> found, the page must stay JavaScript-free"; fail=1; fi
          if grep -q "ZgotmplZ" "$f"; then echo "::error file=$f::ZgotmplZ leaked, font workaround in gen-preview.py is broken"; fail=1; fi
          raw=$(wc -c < "$f"); gz=$(gzip -c "$f" | wc -c)
          echo "index.html: ${raw} B raw / ${gz} B gzipped"
          exit $fail

      - name: Stage site
        run: |
          rm -rf _site
          mkdir -p _site
          cp docs/index.html _site/index.html
          # Carry along optional visual assets if they exist.
          if [ -d docs/screenshots ]; then cp -r docs/screenshots _site/screenshots; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write          # to deploy to Pages
      id-token: write       # to verify the deployment origin
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
