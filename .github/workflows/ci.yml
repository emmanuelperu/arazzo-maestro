# Run on every push to main and on every pull request.
#
# Mirrors what `make test vet lint dist` does locally — anything green
# in CI must also be green when a contributor runs `make` on their
# machine, and vice-versa.
#
# Third-party actions are pinned to a full commit SHA (with the
# human-readable version in a trailing comment) to satisfy Scorecard
# `Pinned-Dependencies`. Dependabot (`.github/dependabot.yml`) bumps
# both the SHA and the comment when upstream cuts a new release.

name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default.
permissions:
  contents: read

# Cancel in-flight runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -cover ./...

      - name: go build
        run: go build -o /tmp/arazzo-maestro ./cmd/arazzo-maestro

      - name: Lint the demo Arazzo files
        run: |
          for f in examples/*.arazzo.yaml; do
            echo "→ lint $f"
            /tmp/arazzo-maestro lint "$f"
          done

      - name: Render the demo files (eco-design guard)
        run: |
          /tmp/arazzo-maestro view examples/shop.arazzo.yaml -o /tmp/dist/shop --theme light
          for f in /tmp/dist/shop/*.html; do
            if grep -q "ZgotmplZ" "$f"; then echo "::error file=$f::ZgotmplZ leaked"; exit 1; fi
          done

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # The action major is kept in sync with the binary major:
        # action @v9 supports golangci-lint v2.x (which our
        # .golangci.yml requires — `version: "2"` header). Earlier
        # action majors (@v6 and below) only accept v1.x binaries.
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          # v2.x is required because our .golangci.yml uses the v2
          # format and our go.mod targets Go 1.25 — the v1.64.x line
          # is built with Go 1.24 and refuses to lint newer modules.
          version: v2.12.2

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck ./...
        run: govulncheck ./...
