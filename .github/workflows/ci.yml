# Run on every push to main and on every pull request.
#
# Mirrors what `make test vet lint dist` does locally — anything green
# in CI must also be green when a contributor runs `make` on their
# machine, and vice-versa.
#
# NOTE (OpenSSF Phase 1, see Plan.md): pin these actions to a commit
# SHA instead of a tag before claiming the Scorecard
# "Pinned-Dependencies" criterion. Tags are used here for readability;
# Dependabot (`.github/dependabot.yml`) keeps them in step with the
# upstream versions and can be reconfigured to bump SHAs.

name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default.
permissions:
  contents: read

# Cancel in-flight runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -cover ./...

      - name: go build
        run: go build -o /tmp/arazzo-maestro ./cmd/arazzo-maestro

      - name: Lint the demo Arazzo files
        run: |
          for f in examples/*.arazzo.yaml; do
            echo "→ lint $f"
            /tmp/arazzo-maestro lint "$f"
          done

      - name: Render the demo files (eco-design guard)
        run: |
          /tmp/arazzo-maestro view examples/shop.arazzo.yaml -o /tmp/dist/shop --theme light
          for f in /tmp/dist/shop/*.html; do
            if grep -q "ZgotmplZ" "$f"; then echo "::error file=$f::ZgotmplZ leaked"; exit 1; fi
          done

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # @v7 is required to pin a v2.x golangci-lint binary. @v6 only
        # supports v1.x and rejects v2 with "you must update to v7".
        uses: golangci/golangci-lint-action@v9
        with:
          # v2.x is required because (a) our .golangci.yml uses the v2
          # config format (version: "2"), and (b) the v1.64.8 default
          # is built with Go 1.24 and refuses to lint a project
          # targeting Go 1.25 (our go.mod).
          version: v2.12.2

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck ./...
        run: govulncheck ./...
