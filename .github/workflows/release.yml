# Triggered when a `v*` tag is pushed. Hands off to goreleaser which
# builds the binaries, the Docker images, the SBOM, signs everything
# via cosign keyless (GitHub OIDC), and creates the GitHub Release.
#
# OpenSSF Phase 2 of Plan.md — unlocks the `Signed-Releases` and
# `Packaging` Scorecard checks plus the first release artefacts.

name: release

on:
  push:
    tags: ["v*"]

# Least privilege at workflow level.
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      # Create the GitHub Release and upload assets.
      contents: write
      # Push to ghcr.io.
      packages: write
      # Cosign keyless signing via GitHub OIDC.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history is needed for the changelog

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU (cross-arch Docker)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
